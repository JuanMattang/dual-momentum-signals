name: EWY 데이터 REAL_ETF_DATA 추가

on:
  workflow_dispatch:

jobs:
  add-ewy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yfinance 설치
        run: pip install yfinance

      - name: EWY 데이터 수집
        run: python add_ewy_to_dashboard.py

      - name: ewy_returns.json 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ewy_returns.json
          git diff --cached --quiet || git commit -m "feat: EWY 수익률 데이터 저장"
          git push
