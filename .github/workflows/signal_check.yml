name: 듀얼 모멘텀 시그널 체크

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  signal-check:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 이전 상태 파일 복원 (캐시)
        uses: actions/cache@v4
        with:
          path: .signal_state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: |
            signal-state-

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yfinance 설치
        run: pip install yfinance

      - name: 시그널 체크 실행
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python notify_signals.py
