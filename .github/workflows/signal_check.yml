name: 듀얼 모멘텀 시그널 체크

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  signal-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: yfinance 설치
        run: pip install yfinance

      - name: 시그널 체크 실행
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python notify_signals.py

      - name: 상태 파일 저장
        run: |
          git config user.name  "Signal Bot"
          git config user.email "signal-bot@noreply.github.com"
          git add .signal_state.json
          git diff --staged --quiet || git commit -m "chore: update signal state $(date +'%Y-%m-%d')"
          git push
