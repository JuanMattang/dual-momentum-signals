<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DAA 듀얼 모멘텀 대시보드</title>

  <!-- React 18 CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (JSX 변환) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; font-size: 1.2rem; color: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="loading">⏳ 대시보드 로딩 중...</div>
  <div id="root"></div>

  <!-- 실시간 가격 (GitHub Actions가 매일 업데이트) -->
  <script src="live_prices.js"></script>

  <!-- 대시보드 컴포넌트 -->
  <script type="text/babel" src="DualMomentumDashboard.jsx"></script>

  <script>
    // 로딩 메시지 제거
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 500);
    });
  </script>
</body>
</html>
